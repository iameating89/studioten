<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocal Studio DAW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a0a0c;
            color: #e2e8f0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        .glow-red { box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); }
        .glow-blue { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .grid-bg {
            background-image: linear-gradient(to right, #1a1a1e 1px, transparent 1px),
                              linear-gradient(to bottom, #1a1a1e 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .vumeter-container {
            height: 100px;
            width: 10px;
            background: #1e1e24;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }
        .vumeter-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(to top, #10b981, #facc15, #ef4444);
            transition: height 0.05s ease;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Top Navigation Bar -->
    <header class="h-14 border-b border-white/10 flex items-center justify-between px-6 bg-[#121216]">
        <div class="flex items-center gap-4">
            <div class="text-blue-500 font-bold tracking-tighter text-xl flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                STUDIO ONE
            </div>
            <div class="h-6 w-[1px] bg-white/10 mx-2"></div>
            <div class="flex gap-4 text-xs font-medium text-gray-400">
                <span>FILE</span>
                <span>EDIT</span>
                <span>TRACK</span>
                <span>MIX</span>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div class="bg-black/40 px-3 py-1 rounded border border-white/5 font-mono text-sm text-blue-400">
                00:00:00:00
            </div>
            <div class="flex items-center gap-2 text-xs text-gray-500">
                <span class="text-green-500">CPU 12%</span>
                <span>44.1kHz</span>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 border-r border-white/10 bg-[#0f0f13] p-4 flex flex-col gap-6">
            <div>
                <h3 class="text-[10px] font-bold text-gray-500 tracking-widest uppercase mb-4">Instruments</h3>
                <div class="space-y-2">
                    <div class="bg-blue-600/10 border border-blue-500/30 p-2 rounded text-sm flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                        Vocal Transformer
                    </div>
                    <div class="bg-white/5 p-2 rounded text-sm text-gray-400 flex items-center gap-3 grayscale">
                        <div class="w-2 h-2 rounded-full bg-gray-600"></div>
                        808 Bass Synth
                    </div>
                </div>
            </div>

            <div>
                <h3 class="text-[10px] font-bold text-gray-500 tracking-widest uppercase mb-4">Effects Chain</h3>
                <div class="space-y-1">
                    <div class="flex justify-between text-[11px] p-1 border-b border-white/5">
                        <span>PITCH SHIFT</span>
                        <span class="text-blue-400">+1.0 Oct</span>
                    </div>
                    <div class="flex justify-between text-[11px] p-1 border-b border-white/5">
                        <span>DISTORTION</span>
                        <span class="text-red-400">HARD</span>
                    </div>
                    <div class="flex justify-between text-[11px] p-1 border-b border-white/5 text-gray-600">
                        <span>REVERB</span>
                        <span>OFF</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Timeline Area -->
        <section class="flex-1 relative grid-bg flex flex-col">
            <!-- Timeline Rulers -->
            <div class="h-8 border-b border-white/10 bg-white/5 flex items-end px-2 gap-20 text-[10px] text-gray-600 font-mono">
                <span>1.1</span><span>2.1</span><span>3.1</span><span>4.1</span><span>5.1</span><span>6.1</span><span>7.1</span><span>8.1</span>
            </div>

            <!-- Tracks -->
            <div class="flex-1 overflow-y-auto">
                <!-- Track 1: Beat -->
                <div class="h-32 border-b border-white/10 flex">
                    <div class="w-48 bg-[#1a1a20] p-3 border-r border-white/10 shrink-0">
                        <div class="text-xs font-bold mb-1">BEAT LOOP</div>
                        <div class="flex gap-1">
                            <button class="bg-gray-700 w-6 h-4 text-[8px] rounded">M</button>
                            <button class="bg-yellow-600 w-6 h-4 text-[8px] rounded">S</button>
                        </div>
                        <div class="mt-4 h-1 bg-gray-800 rounded-full overflow-hidden">
                            <div class="w-3/4 h-full bg-blue-500"></div>
                        </div>
                    </div>
                    <div class="flex-1 flex items-center px-10">
                        <div id="beat-visual" class="w-full h-16 flex items-center gap-1 opacity-40">
                            <!-- Visual bars generated by JS -->
                        </div>
                    </div>
                </div>

                <!-- Track 2: Vocals -->
                <div id="vocal-track" class="h-32 border-b border-white/10 flex bg-red-500/5">
                    <div class="w-48 bg-[#1a1a20] p-3 border-r border-white/10 shrink-0">
                        <div class="text-xs font-bold mb-1 text-red-400">VOCAL REC</div>
                        <div class="flex gap-1">
                            <button class="bg-gray-700 w-6 h-4 text-[8px] rounded">M</button>
                            <button class="bg-yellow-600 w-6 h-4 text-[8px] rounded">S</button>
                        </div>
                        <div class="mt-4 flex items-center gap-2">
                            <div class="vumeter-container"><div id="vocal-meter" class="vumeter-fill" style="height: 0%"></div></div>
                            <span class="text-[9px] font-mono text-gray-500">-inf dB</span>
                        </div>
                    </div>
                    <div class="flex-1 relative overflow-hidden">
                        <canvas id="waveform-canvas" class="w-full h-full"></canvas>
                        <div id="recording-overlay" class="absolute inset-0 bg-red-500/10 hidden animate-pulse items-center justify-center">
                            <span class="text-red-500 font-bold text-xs tracking-tighter">RECORDING...</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Transport Controls (Bottom) -->
    <footer class="h-24 bg-[#121216] border-t border-white/10 flex items-center justify-center gap-12">
        <div class="flex flex-col items-center gap-1">
            <span class="text-[10px] text-gray-500">TEMPO</span>
            <span class="text-xl font-mono text-blue-400">128.00</span>
        </div>

        <div class="flex items-center gap-4">
            <button id="play-beat-btn" class="w-12 h-12 rounded-full bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </button>
            
            <button id="record-btn" class="px-8 h-12 rounded-full bg-red-600 hover:bg-red-500 flex items-center gap-3 font-bold transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                <div class="w-3 h-3 rounded-full bg-white animate-pulse" id="rec-dot"></div>
                RECORD LYRICS
            </button>
        </div>

        <div class="flex flex-col items-center gap-1">
            <span class="text-[10px] text-gray-500">MASTER VOL</span>
            <input type="range" class="accent-blue-500 h-1 w-24">
        </div>
    </footer>

    <div id="init-overlay" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center">
        <button id="start-app" class="px-10 py-4 bg-blue-600 rounded-lg font-bold hover:scale-105 transition-transform">
            INITIALIZE STUDIO ENGINE
        </button>
    </div>

    <script>
        let audioCtx;
        let beatBuffer;
        let beatSource;
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let isPlaying = false;

        const startBtn = document.getElementById('start-app');
        const playBeatBtn = document.getElementById('play-beat-btn');
        const recordBtn = document.getElementById('record-btn');
        const waveformCanvas = document.getElementById('waveform-canvas');
        const ctx = waveformCanvas.getContext('2d');
        const vocalMeter = document.getElementById('vocal-meter');

        // Generate static beat visual bars
        const beatVisual = document.getElementById('beat-visual');
        for(let i=0; i<100; i++) {
            const bar = document.createElement('div');
            bar.className = 'w-1 bg-blue-500 rounded-full';
            bar.style.height = (Math.random() * 80 + 10) + '%';
            beatVisual.appendChild(bar);
        }

        async function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('init-overlay').classList.add('hidden');
            
            // Create a simple procedural drum beat since we can't load external files reliably
            beatBuffer = createProceduralBeat();
        }

        function createProceduralBeat() {
            const duration = 2; // 2 second loop
            const sampleRate = audioCtx.sampleRate;
            const buffer = audioCtx.createBuffer(2, sampleRate * duration, sampleRate);
            
            for (let channel = 0; channel < 2; channel++) {
                const nowBuffering = buffer.getChannelData(channel);
                for (let i = 0; i < buffer.length; i++) {
                    const t = i / sampleRate;
                    // Kick at 0, 0.5, 1, 1.5
                    let kick = Math.sin(2 * Math.PI * 50 * Math.exp(-20 * (t % 0.5))) * Math.exp(-5 * (t % 0.5));
                    // Snare at 0.25, 0.75, 1.25, 1.75
                    let snareT = (t + 0.25) % 0.5;
                    let snare = (Math.random() * 2 - 1) * Math.exp(-15 * snareT);
                    // Hi-hat
                    let hat = (Math.random() * 2 - 1) * Math.exp(-50 * (t % 0.125)) * 0.1;
                    
                    nowBuffering[i] = (kick * 0.8) + (snare * 0.4) + hat;
                }
            }
            return buffer;
        }

        function toggleBeat() {
            if (isPlaying) {
                if (beatSource) beatSource.stop();
                isPlaying = false;
                playBeatBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
            } else {
                beatSource = audioCtx.createBufferSource();
                beatSource.buffer = beatBuffer;
                beatSource.loop = true;
                beatSource.connect(audioCtx.destination);
                beatSource.start();
                isPlaying = true;
                playBeatBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
            }
        }

        async function startRecording() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            // Visualizer setup
            const source = audioCtx.createMediaStreamSource(stream);
            const analyzer = audioCtx.createAnalyser();
            source.connect(analyzer);
            
            mediaRecorder = new MediaRecorder(stream);
            recordedChunks = [];
            
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => processAndPlayLyrics();
            
            mediaRecorder.start();
            isRecording = true;
            document.getElementById('recording-overlay').classList.remove('hidden');
            document.getElementById('recording-overlay').classList.add('flex');
            recordBtn.innerHTML = "STOP & PROCESS";
            recordBtn.classList.replace('bg-red-600', 'bg-gray-800');

            // Animation Loop for Waveform and Meter
            const fData = new Uint8Array(analyzer.frequencyBinCount);
            function draw() {
                if (!isRecording) return;
                analyzer.getByteFrequencyData(fData);
                
                // VU Meter
                let sum = 0;
                for(let i=0; i<fData.length; i++) sum += fData[i];
                const avg = sum / fData.length;
                vocalMeter.style.height = Math.min(100, avg * 2) + '%';

                // Waveform
                ctx.fillStyle = 'rgba(10, 10, 12, 0.2)';
                ctx.fillRect(0, 0, waveformCanvas.width, waveformCanvas.height);
                ctx.strokeStyle = '#ef4444';
                ctx.lineWidth = 2;
                ctx.beginPath();
                const sliceWidth = waveformCanvas.width / fData.length;
                let x = 0;
                for(let i=0; i<fData.length; i++) {
                    const v = fData[i] / 128.0;
                    const y = v * waveformCanvas.height / 2;
                    if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    x += sliceWidth;
                }
                ctx.stroke();
                requestAnimationFrame(draw);
            }
            draw();
        }

        function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;
            document.getElementById('recording-overlay').classList.add('hidden');
            document.getElementById('recording-overlay').classList.remove('flex');
            recordBtn.innerHTML = "RECORD LYRICS";
            recordBtn.classList.replace('bg-gray-800', 'bg-red-600');
            vocalMeter.style.height = '0%';
        }

        async function processAndPlayLyrics() {
            const blob = new Blob(recordedChunks, { type: 'audio/webm' });
            const arrayBuffer = await blob.arrayBuffer();
            const originalBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            // Effect setup
            const offlineCtx = new OfflineAudioContext(
                originalBuffer.numberOfChannels,
                originalBuffer.length,
                originalBuffer.sampleRate
            );

            const source = offlineCtx.createBufferSource();
            source.buffer = originalBuffer;

            // 1. PITCH UP EFFECT (Using playbackRate)
            // Faster playback = higher pitch
            source.playbackRate.value = 1.6; 

            // 2. DISTORTION EFFECT
            const dist = offlineCtx.createWaveShaper();
            function makeDistortionCurve(amount) {
                let k = typeof amount === 'number' ? amount : 50,
                    n_samples = 44100,
                    curve = new Float32Array(n_samples),
                    deg = Math.PI / 180,
                    i = 0,
                    x;
                for ( ; i < n_samples; ++i ) {
                    x = i * 2 / n_samples - 1;
                    curve[i] = ( 3 + k ) * x * 20 * deg / ( Math.PI + k * Math.abs(x) );
                }
                return curve;
            }
            dist.curve = makeDistortionCurve(400);
            dist.oversample = '4x';

            // 3. GAIN (To compensate for distortion volume changes)
            const gain = offlineCtx.createGain();
            gain.gain.value = 0.7;

            // Route: Source -> Distortion -> Gain -> Destination
            source.connect(dist);
            dist.connect(gain);
            gain.connect(offlineCtx.destination);
            
            source.start(0);

            const renderedBuffer = await offlineCtx.startRendering();
            
            // Play the processed version
            const playSource = audioCtx.createBufferSource();
            playSource.buffer = renderedBuffer;
            playSource.connect(audioCtx.destination);
            playSource.start();
        }

        startBtn.onclick = initAudio;
        playBeatBtn.onclick = toggleBeat;
        recordBtn.onclick = () => {
            if (isRecording) stopRecording();
            else startRecording();
        };

        // Resize canvas
        function resize() {
            waveformCanvas.width = waveformCanvas.parentElement.clientWidth;
            waveformCanvas.height = waveformCanvas.parentElement.clientHeight;
        }
        window.onresize = resize;
        resize();

    </script>
</body>
</html>
